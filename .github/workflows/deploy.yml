# dist → gh-pages 브랜치 푸시 (JamesIves — peaceiris 대체, git safe.directory 등으로 푸시 실패 감소)
# Pages: Settings → Build and deployment → Source = Deploy from a branch → Branch: gh-pages / (root)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# 연속 푸시 시 이전 잡이 취소되면 mid-push로 git exit 1이 날 수 있어, 배포는 끊지 않음
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_KAKAO_JS_KEY: ${{ secrets.VITE_KAKAO_JS_KEY }}
        run: npm run build

      - name: Verify dist
        run: |
          test -f dist/index.html
          ls -la dist

      # Jekyll 비활성(underscore 경로·정적 HTML) — peaceiris enable_jekyll: false와 동일
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Push dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.6.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
          commit-message: 'deploy: ${{ github.sha }}'
